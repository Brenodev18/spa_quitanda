<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Spa_quitanda</title>
</head>
<body>
    <header>
        <h1>Quitanda - Estoque</h1>
        <div class="crud">
            <button>Cadastrar</button>
            <button>Atualizar</button>
            <button id="del">Deletar</button>
        </div>
    </header>

    <div class="grid">

        <div class="cards">
            <img src="img/melão.webp" alt="">
            <h3 id="nome">Melão</h3>
            <div class="ctg">      
                <h4 id="categoria">Fruta</43>
                <h4 id="unidade">Kg</h4>
            </div>
            <p id="preco">R$ 10,00</p>
            <button id="quantidade">Quantidade = 15</button>
        </div>

        <div class="cards">
            <img src="img/abacaxi-0-cke.webp" alt="">
            <h3 id="nome">Abacaxi</h3>
            <div class="ctg">      
                <h4 id="categoria">Fruta</43>
                <h4 id="unidade">Kg</h4>
            </div>
            <p id="preco">R$ 8,00</p>
            <button id="unidade">Quantidade = 15</button>
        </div>

        <div class="cards">
            <img src="img/banana-prata.webp" alt="">

            <div class="ctg">      
                <h4 id="categoria">Fruta</43>
                <h4 id="unidade">Kg</h4>
            </div>
            <p id="preco">R$ 5,00</p>
            <button id="unidade">Quantidade = 15</button>
        </div>

        <div class="cards">
            <img src="img/pimentao-verde.webp" alt="">

            <div class="ctg">      
                <h4 id="categoria">Legume</43>
                <h4 id="unidade">Kg</h4>
            </div>
            <p id="preco">R$ 2,00</p>
            <button id="unidade">Quantidade = 15</button>
        </div>

        <div class="cards">
            <img src="img/Abacate.jpg" alt="">
            <h3 id="nome">Abacate</h3>
            <div class="ctg">      
                <h4 id="categoria">Fruta</43>
                <h4 id="unidade">Kg</h4>
            </div>
            <p id="preco">R$ 7,00</p>

        <div class="cards">

                <h4 id="categoria">Fruta</43>

        </div>

</body>
</html>
